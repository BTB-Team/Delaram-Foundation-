<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delaram | Contact</title>
    <!-- google font links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- css links -->
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/contact.css">
    <!-- GOOGLE ICONS -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
</head>
<body>
    <!-- ============== Mahboba Ahmadi page ==============  -->

    <section class="contact-section section" id="contact">
    
    
        <!-- TOP -->
        <!-- FULL WIDTH HERO -->
        <div class="background-img">
    
            <div class="contact-heading text-center">
    
                <h1 class="contact-title" data-en="Get in Touch" data-fa="با ما در تماس شوید">
    
                    Get in Touch
    
                </h1>
    
                <p class="contact-text"
                    data-en="We would love to hear from you. Contact us for any questions, support, or partnership opportunities."
                    data-fa="ما خوشحال می‌شویم از شما بشنویم. برای سوالات، همکاری یا دریافت معلومات با ما تماس بگیرید.">
    
                    We would love to hear from you.
    
                </p>
    
                <!-- LANGUAGE -->
    
                <div class="lang-switch">
    
                    <button type="button" class="lang-btn en-btn active">
                        EN
                    </button>
    
                    <button type="button" class="lang-btn fa-btn">
                        دری
                    </button>
    
                </div>
    
            </div>
    
        </div>
    
    
        <!-- MAIN -->
        <div class="container">
    
            <div class="contact-layout">
    
                <!-- CONTACT CARD -->
    
                <div>
                    <div class="contact-card">
    
                        <!-- ADDRESS -->
    
                        <div class="contact-item">
    
                            <div class="contact-icon">
    
                                <span class="material-symbols-outlined">
                                    location_on
                                </span>
    
                            </div>
    
                            <div class="contact-content">
    
                                <h4 data-en="Address" data-fa="آدرس">
    
                                    Address
    
                                </h4>
    
                                <p data-en="Kabul, Afghanistan" data-fa="کابل، افغانستان">
    
                                    Kabul, Afghanistan
    
                                </p>
    
                            </div>
    
                        </div>
    
                        <!-- PHONE -->
    
                        <div class="contact-item">
    
                            <div class="contact-icon">
    
                                <span class="material-symbols-outlined">
                                    call
                                </span>
    
                            </div>
    
                            <div class="contact-content">
    
                                <h4 data-en="Phone" data-fa="شماره تماس">
    
                                    Phone
    
                                </h4>
    
                                <p dir="ltr">
                                    +93 700 000 000
                                </p>
    
                            </div>
    
                        </div>
    
                        <!-- EMAIL -->
    
                        <div class="contact-item">
    
                            <div class="contact-icon">
    
                                <span class="material-symbols-outlined">
                                    mail
                                </span>
    
                            </div>
    
                            <div class="contact-content">
    
                                <h4 data-en="Email" data-fa="ایمیل">
    
                                    Email
    
                                </h4>
    
                                <p dir="ltr">
                                    info@organization.org
                                </p>
    
                            </div>
    
                        </div>
    
                    </div>
                    <!-- MAP -->
    
                    <div class="map-wrapper">
    
                        <iframe src="https://www.google.com/maps?q=Kabul%20Afghanistan&output=embed" loading="lazy"
                            allowfullscreen referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
    
                    </div>
                </div>
    
    
                <!-- FORM -->
    
                <div class="contact-form-wrapper">
    
                    <form aria-label="Contact form">
    
                        <div class="grid grid-2">
    
                            <!-- NAME -->
    
                            <div class="form-group">
    
                                <label for="full-name" data-en="Full Name" data-fa="نام کامل">
    
                                    Full Name
    
                                </label>
    
                                <input id="full-name" type="text" class="input" placeholder="Enter your name"
                                    data-placeholder-en="Enter your name" data-placeholder-fa="نام خود را وارد کنید"
                                    required>
    
                            </div>
    
                            <!-- EMAIL -->
    
                            <div class="form-group">
    
                                <label for="email" data-en="Email Address" data-fa="ایمیل">
    
                                    Email Address
    
                                </label>
    
                                <input id="email" type="email" class="input" placeholder="Enter your email"
                                    data-placeholder-en="Enter your email" data-placeholder-fa="ایمیل خود را وارد کنید"
                                    required>
    
                            </div>
    
                        </div>
    
                        <!-- SUBJECT -->
    
                        <div class="form-group">
    
                            <label for="subject" data-en="Subject" data-fa="موضوع">
    
                                Subject
    
                            </label>
    
                            <input id="subject" type="text" class="input" placeholder="Enter subject"
                                data-placeholder-en="Enter subject" data-placeholder-fa="موضوع را وارد کنید" required>
    
                        </div>
    
                        <!-- MESSAGE -->
    
                        <div class="form-group">
    
                            <label for="message" data-en="Message" data-fa="پیام">
    
                                Message
    
                            </label>
    
                            <textarea id="message" class="input" placeholder="Write your message..."
                                data-placeholder-en="Write your message..." data-placeholder-fa="پیام خود را بنویسید..."
                                required></textarea>
    
                        </div>
    
                        <!-- BUTTON -->
    
                        <button type="submit" class="btn-primary">
    
                            <span data-en="Send Message" data-fa="ارسال پیام">
    
                                Send Message
    
                            </span>
    
                        </button>
    
                    </form>
    
                </div>
    
            </div>
    
    
        </div>
    
    </section>




    <!-- end code -->
    <!-- <script src="./src/js/main.js" defer></script> -->
    <script src="./src/js/contact.js" defer></script>
</body>
</html>
